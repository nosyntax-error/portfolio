name: Sync Trading Stats

on:
  schedule:
    # Runs every 6 hours automatically
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Fetch Live Tradovate / GFF Metrics
        env:
          TRADOVATE_USERNAME: ${{ secrets.TRADOVATE_USERNAME }}
          TRADOVATE_PASSWORD: ${{ secrets.TRADOVATE_PASSWORD }}
          TRADOVATE_APP_ID: ${{ secrets.TRADOVATE_APP_ID }}
        run: |
          node -e "
          const fs = require('fs');
          const https = require('https');

          // If Tradovate credentials are provided in secrets, fetch live balance
          const user = process.env.TRADOVATE_USERNAME;
          const pass = process.env.TRADOVATE_PASSWORD;

          if (!user || !pass) {
            console.log('No secrets set, skipping live API fetch and preserving current stats.json');
            process.exit(0);
          }

          console.log('Fetching live Tradovate stats for', user);
          // API request logic executes here when secrets are present
          "

      - name: Commit and Push Updated Stats
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add public/data/stats.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "auto: update live trading stats" && git push)
