name: Sync Trading Stats

on:
  schedule:
    # Runs every 6 hours automatically
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Fetch Live Tradovate / GFF Metrics
        env:
          TRADOVATE_USERNAME: ${{ secrets.TRADOVATE_USERNAME }}
          TRADOVATE_PASSWORD: ${{ secrets.TRADOVATE_PASSWORD }}
        run: |
          node -e "
          const fs = require('fs');
          const https = require('https');

          const user = process.env.TRADOVATE_USERNAME;
          const pass = process.env.TRADOVATE_PASSWORD;

          if (!user || !pass) {
            console.log('No secrets configured. Preserving current stats.json.');
            process.exit(0);
          }

          console.log('Authenticating with Tradovate API for user:', user);

          function makeRequest(options, data) {
            return new Promise((resolve, reject) => {
              const req = https.request(options, (res) => {
                let body = '';
                res.on('data', (chunk) => body += chunk);
                res.on('end', () => {
                  try {
                    resolve(JSON.parse(body));
                  } catch (e) {
                    resolve(body);
                  }
                });
              });
              req.on('error', reject);
              if (data) req.write(data);
              req.end();
            });
          }

          async function sync() {
            try {
              const authBody = JSON.stringify({
                name: user,
                password: pass,
                appId: 'PortfolioSync',
                appVersion: '1.0',
                cid: 1,
                sec: '0'
              });

              const authRes = await makeRequest({
                hostname: 'live.tradovateapi.com',
                path: '/v1/auth/accesstokenrequest',
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'Content-Length': Buffer.byteLength(authBody)
                }
              }, authBody);

              if (!authRes.accessToken) {
                console.log('Tradovate Auth Note:', authRes.errorText || 'Using fallback/snapshot metrics');
                process.exit(0);
              }

              const token = authRes.accessToken;
              console.log('Authentication successful! Token acquired.');

              const accounts = await makeRequest({
                hostname: 'live.tradovateapi.com',
                path: '/v1/account/list',
                method: 'GET',
                headers: { 'Authorization': 'Bearer ' + token }
              });

              if (Array.isArray(accounts) && accounts.length > 0) {
                const acc = accounts[0];
                const accId = acc.id;

                const balanceRes = await makeRequest({
                  hostname: 'live.tradovateapi.com',
                  path: '/v1/cashBalance/getCashBalanceSnapshot?accountId=' + accId,
                  method: 'GET',
                  headers: { 'Authorization': 'Bearer ' + token }
                });

                if (balanceRes && balanceRes.totalCashValue) {
                  const currentStats = JSON.parse(fs.readFileSync('public/data/stats.json', 'utf8'));
                  currentStats.currentBalance = balanceRes.totalCashValue;
                  currentStats.currentEquity = balanceRes.totalCashValue;
                  currentStats.lastUpdated = new Date().toISOString();

                  fs.writeFileSync('public/data/stats.json', JSON.stringify(currentStats, null, 2));
                  console.log('Successfully updated stats.json with live cash balance:', balanceRes.totalCashValue);
                }
              }
            } catch (err) {
              console.log('Sync note:', err.message);
            }
          }

          sync();
          "

      - name: Commit and Push Updated Stats
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add public/data/stats.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "auto: update live trading stats" && git push)
